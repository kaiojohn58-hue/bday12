<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Guess Your Age</title>

    <style>
        * {
            font-family: retro;
            cursor: url('cursor.png') 0 0, auto;
        }

        html {
            min-height: 100%;
            background-image: url('p1b.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: transparent;
            min-height: 100vh;
            text-align: center;
            margin: 0;
            padding-bottom: 40px;
        }

        @font-face {
            font-family: retro;
            src: url('Nippo-Medium.otf');
        }

        h1 {
            margin-top: 30px;
            font-family: retro;
            font-size: 35px;
            letter-spacing: 4px;
            color: white;
            animation: floatTitle 2s ease-in-out infinite;
        }

        @keyframes floatTitle {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }

        }

        h2 {
            letter-spacing: 3px;
            font-size: 25px;
            color: white;
            font-family: retro;
        }

        .grid {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 15px;
            justify-content: center;
        }

        .box {
            background: #4000ff;
            padding: 15px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 3px 3px 3px 3px #91cafd;
        }

        .box.selected {
            background: #0e014f;
            color: white;

            box-shadow:
                0 0 10px #6a5cff,
                0 0 20px #6a5cff;
        }

        button {
            margin-top: 25px;
            padding: 15px 60px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #guessBtn {
            background: #0edb57;
            font-size: 20px;
            padding: 20px auto;
        }

        .resultBox {
            width: 60%;
            margin: 20px auto;
            background: #7b0a35;
            color: white;
            padding: 40px;
            border-radius: 10px;
            font-size: 18px;

            border: 4px solid #ff3d6e;

            box-shadow:
                0 0 10px #ff3d6e,
                0 0 20px #ff3d6e,
                inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px;
        }

        #resetBtn {
            background: #ff3030;
            color: white;
        }


        #nextBtn {
            background: #1f5eff;
            color: white;
        }

        .loading {
            font-style: italic;
            opacity: .8;
        }
        h3{
            color: white;
            letter-spacing:2px;
        }
    </style>
</head>

<body>
    <h2>Hey! Birthday Girl🎉</h2>
    <h3>Here's a small gift for you but first,</h3>
    <h1>Let's guess your age...</h1>
    <h2>Choose a number !</h2>

    <div class="grid">

        <div class="box">10</div>
        <div class="box">13</div>
        <div class="box">16</div>
        <div class="box">17</div>
        <div class="box">19</div>
        <div class="box">21</div>
        <div class="box">22</div>
        <div class="box">26</div>
        <div class="box">27</div>
        <div class="box">30</div>

    </div>

    <button id="guessBtn">GUESS</button>

    <div class="resultBox" id="result">
        Pick a number and press Guess ->
    </div>

    <div class="controls">
        <button id="resetBtn">GUESS AGAIN...</button>
        <a href="page2.html"><button id="nextBtn">MOVE AHEAD</button></a>
    </div>
    <audio id="bgMusic" autoplay loop>
        <source src="nickpanekaiassets-red-e-8-bit-chiptune-for-retro-gaming-356128.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");

        // restore music state
        window.addEventListener("load", () => {

            // Always start from the beginning on refresh
            localStorage.removeItem("musicTime");
            music.currentTime = 0;

            // Try to autoplay immediately (works if user navigated from another page)
            music.play().then(() => {
                localStorage.setItem("musicPlaying", "true");
            }).catch(() => {
                // Browser blocked autoplay — wait for first interaction
            });

        });

        // Fallback: start on first interaction if autoplay was blocked
        document.addEventListener("click", () => {
            if (music.paused) {
                music.play();
                localStorage.setItem("musicPlaying", "true");
            }
        }, { once: false });
        let selectedNumber = null

        document.querySelectorAll(".box").forEach(box => {

            box.addEventListener("click", () => {

                document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"))

                box.classList.add("selected")

                selectedNumber = parseInt(box.innerText)

            })

        })


        const loadingLines = [

            "Scanning birthday database...",
            "Calculating your height from your shoe size...",
            "Counting how many times you don't pick up my calls",
            "Analyzing social media statistics...",
            "Checking restaurents with \"kuch bhi chalega\" menu...",
            "Running advanced girlfriend algorithms...",
            "Detecting silence frequency...",
            "Measuring cuteness levels...",
            "Consulting the universe...",
            "Finalizing secret calculations..."

        ]


        const calculations = {

            10: {
                steps: [
                    "10 × 2 = 20 <br><small>Doubling it because you somehow double the happiness in my life.</small>",
                    "20 + 24 = 44 <br><small>24 = the number of hours I could listen to you talk.</small>",
                    "44 ÷ 2 = 22 <br><small>And it's too much fun!!</small>"
                ]
            },

            13: {
                steps: [
                    "13 - 1 = 12 <br><small>12 hours, the longest call we talked on.</small>",
                    "12 + 14 = 26 <br><small>26 little stories you open in the main story.</small>",
                    "26 - 4 = 22 <br><small>The actual 4 things you were supposed to tell.</small>"
                ]
            },

           16: {
steps: [
"16 + 4 = 20 <br><small>The number of random things we end up talking about in one conversation.</small>",
"20 + 4 = 24 <br><small>24 hours is still not enough time to talk to you.</small>",
"24 - 2 = 22 <br><small>2 blinks and woahh 1 hour gone..</small>"
]
},
            17: {
                steps: [
                    "17 × 2 = 34 <br><small>3 hangouts a month, 12 months a year.</small>",
                    "34 + 10 = 44 <br><small>As you make me wait 44 minutes after saying 10 minutes.</small>",
                    "44 ÷ 2 = 22 <br><small>The 22 yrs old girl with whom I like to make plans with.</small>"
                ]
            },

            19: {
                steps: [
                    "19 + 6 = 25 <br><small>25 minutes is all I have to feed you before you start getting grumpy.</small>",
                    "25 - 3 = 22 <br><small>The 3-course meal I could make for you any day.</small>",
                    "22 + 0 = 22 <br><small>0 seconds is all it takes for you to be nice to me again after eating.</small>"
                ]
            },

           21: {
steps: [
"21 + 6 = 27 <br><small>The number of days in a month you deserve to be spoiled.</small>",
"27 - 4 = 23 <br><small>Leaving 4 days for you to spoil me back.</small>",
"23 - 1 = 22 <br><small>Where 1 kiss is all it takes. </small>"
]
},

            22: {
                steps: [
                    "22 × 2 = 44 <br><small>Double celebrations for the birthday girl.</small>",
                    "44 − 22 = 22 <br><small>Subtracting because too young to feel old.</small>",
                    "22 + 0 = 22 <br><small>Happy birthday, you're 22!</small>"
                ]
            },

            26: {
                steps: [
                    "26 × 2 = 52 <br><small>Because you double the chaos.</small>",
                    "52 − 8 = 44 <br><small>8 outfit changes before you find the perfect one.</small>",
                    "44 ÷ 2 = 22 <br><small>Easy math baby >.<</small>"
                ]
            },
27: {
steps: [
"27 × 3 = 81 <br><small>Triple the mischief when we are together.</small>",
"81 % 8 = 1 <br><small>1 other reason why life is more fun with you.</small>",
"1 + 21 = 22 <br><small>Which finally brings us to your age — 22.</small>"
]
}
            ,

            30: {
                steps: [
                    "30 - 5 = 25 <br><small>As you are 5 inches shorter than me.</small>",
                   "25 + 2 - 3 = 22 <br><small>Heels? No heels? purrrfect! iykyk</small>",
                    "22 - 0 = 22 <br><small>Have 0 worries, will carry you and your heels up whenever you get tired.</small>"
                ]
            }}

        
    



        document.getElementById("guessBtn").onclick = () => {

            if (!selectedNumber) {

                alert("Pick a number first!")

                return

            }

            const result = document.getElementById("result")

            result.innerHTML = "<span class='loading'>Running calculations...</span>"

            let count = 0

            let loadingInterval = setInterval(() => {

                result.innerHTML = "<span class='loading'>" + loadingLines[Math.floor(Math.random() * loadingLines.length)] + "</span>"

                count++

                if (count > 4) {

                    clearInterval(loadingInterval)

                    showResult()

                }

            }, 3000)

        }

        function showResult() {

            const data = calculations[selectedNumber]

            const result = document.getElementById("result")

            result.innerHTML =
                data.steps[0] + "<br><br>" +
                data.steps[1] + "<br><br>" +
                data.steps[2] + "<br><br>" +
                "<b>YOUR AGE IS 22 🎉</b>"

        }
        document.getElementById("resetBtn").onclick = () => {

            location.reload()

        }





        // ── cursor resize fix ──
        (function () {
            var img = new Image();
            img.src = 'cursor.png';
            img.onload = function () {
                var c = document.createElement('canvas');
                c.width = 32; c.height = 32;
                c.getContext('2d').drawImage(img, 0, 0, 32, 32);
                var url = c.toDataURL('image/png');
                var s = document.createElement('style');
                s.textContent = '* { cursor: url("' + url + '") 0 0, auto !important; }';
                document.head.appendChild(s);
            };
        })();

    </script>

</body>

</html>
